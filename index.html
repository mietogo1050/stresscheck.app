<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>ストレス診断</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,300italic,700,700italic">
  <!-- bootstrap css-->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Google Fonts: Noto Sans Japanese -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">
  <!-- Vue.jsの読み込み -->
  <script src="https://cdn.jsdelivr.net/npm/vue@2.7.11/dist/vue.js"></script>

  <style>
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background-color: #f8f9fa;
    }
    .fade-enter-active, .fade-leave-active {
      transition: opacity 0.3s ease;
    }
    .fade-enter, .fade-leave-to {
      opacity: 0;
    }
    .answerList {
      list-style: none;
      padding: 0;
      display: flex;
      justify-content: center;
      gap: 15px;
    }
  </style>
</head>

<body>
  <header class="text-center py-3">
    <img src="logo.png" alt="ロゴ" class="header-logo" style="max-height: 120px;">
  </header>

  <div class="container" id="app">
    <main class="main">
      <section class="block">
        <h1 class="block-title text-center mb-4">ストレス診断</h1>
        <div class="block-body">
          <div class="contents view">

            <!-- 1. 初期表示 (status === 0) -->
            <transition name="fade" mode="out-in">
              <div class="main top-page text-center" v-if="status === 0" key="start">
                <div class="card p-4 mb-3">
                  <p class="leadText mb-0">あなたのストレス度をチェックします。</p>
                </div>
                <button @click="start" class="btn btn-success btn-lg mt-2">スタート</button>
              </div>

              <!-- 2. 質問表示 (1 <= status <= 質問数) -->
              <div class="main top-page text-center" v-else-if="currentQuestion" :key="status">
                <div class="card p-4 mb-3">
                  <h5><b>質問 {{ currentQuestion.num }}</b></h5>
                  <p class="leadText fs-5 mb-0">{{ currentQuestion.sentence }}</p>
                </div>
                <ul class="answerList">
                  <li><button @click="answer('yes')" class="btn btn-danger btn-lg">はい</button></li>
                  <li><button @click="answer('no')" class="btn btn-primary btn-lg">いいえ</button></li>
                </ul>
              </div>

              <!-- 3. 診断結果 (status > 質問数) -->
              <div class="main top-page text-center" v-else-if="isFinish" key="result">
                <div class="card p-4 mb-3 border-primary">
                  <h4 class="text-primary fw-bold">診断結果</h4>
                  <p class="leadText fs-5 mt-2 mb-0" v-if="result">{{ result.sentence }}</p>
                </div>
                <button @click="reset" class="btn btn-success btn-lg">最初からやり直す</button>
              </div>
            </transition>

          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const questionsList = [
      { num: 1, point: 1, sentence: '非常にたくさんの仕事をしなければならない' },
      { num: 2, point: 2, sentence: '時間内に仕事が処理しきれない' },
      { num: 3, point: 2, sentence: '高度の知識や技術が必要な仕事だ' },
      { num: 4, point: 2, sentence: '自分のペースで仕事ができない' },
      { num: 5, point: 3, sentence: '職場の雰囲気が悪い' },
    ];

    const resultsList = [
      { min: 0, max: 4, sentence: 'あなたはそれほどストレスを感じていません。' },
      { min: 5, max: 7, sentence: '少しストレスを感じているようです。意識的にストレス対処に努めてください。' },
      { min: 8, max: 10, sentence: '非常に多くのストレスを感じているようです。医者の診断を受けてください。' },
    ];

    new Vue({
      el: '#app',
      data: {
        status: 0, /* 0: 未開始, 1〜: 質問番号 */
        sum: 0,    /* トータル点数 */
        questions: questionsList,
        results: resultsList
      },
      computed: {
        // 現在の質問オブジェクトを返す（名前を currentQuestion に変更）
        currentQuestion() {
          return this.questions.find(q => q.num === this.status);
        },
        // 点数に応じた診断結果を返す
        result() {
          return this.results.find(a => this.sum >= a.min && this.sum <= a.max);
        },
        // 全質問が終わったかの判定
        isFinish() {
          return this.status > this.questions.length;
        }
      },
      methods: {
        start() {
          this.status = 1;
        },
        reset() {
          this.status = 0;
          this.sum = 0;
        },
        answer(type) {
          if (type === 'yes' && this.currentQuestion) {
            this.sum += this.currentQuestion.point;
          }
          this.status++;
        }
      }
    });
  </script>
</body>

</html>
